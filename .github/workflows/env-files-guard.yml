name: Guard Env Files

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-env-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure no real .env files are tracked
        run: npm run check:env-files
